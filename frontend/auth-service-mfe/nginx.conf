server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Module Federation entry — no cache + CORS so remotes can fetch it
    location = /remoteEntry.js {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: aggressive caching + CORS so remotes can load shell chunks
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # No caching for index.html so new deployments are picked up
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
